<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Sunflower center -->
  <circle cx="16" cy="16" r="5" fill="#1A1714"/>
  <!-- Petals -->
  <ellipse cx="16" cy="7" rx="2.5" ry="4" fill="#F5C842"/>
  <ellipse cx="16" cy="25" rx="2.5" ry="4" fill="#F5C842"/>
  <ellipse cx="7" cy="16" rx="4" ry="2.5" fill="#F5C842"/>
  <ellipse cx="25" cy="16" rx="4" ry="2.5" fill="#F5C842"/>
  <!-- Diagonal petals -->
  <ellipse cx="10.5" cy="10.5" rx="2.5" ry="4" fill="#E8C46A" transform="rotate(-45 10.5 10.5)"/>
  <ellipse cx="21.5" cy="10.5" rx="2.5" ry="4" fill="#E8C46A" transform="rotate(45 21.5 10.5)"/>
  <ellipse cx="10.5" cy="21.5" rx="2.5" ry="4" fill="#E8C46A" transform="rotate(45 10.5 21.5)"/>
  <ellipse cx="21.5" cy="21.5" rx="2.5" ry="4" fill="#E8C46A" transform="rotate(-45 21.5 21.5)"/>
</svg>
